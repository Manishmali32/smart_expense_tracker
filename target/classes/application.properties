# ================================================================
#  Smart Expense Tracker — application.properties
#  Spring Boot 3.3.x | Java 24 | MySQL 8.x
# ================================================================

# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── MySQL ───────────────────────────────────────────────────────
# createDatabaseIfNotExist=true  → MySQL creates the DB automatically
# useSSL=false                   → avoids SSL handshake on local dev
# serverTimezone=UTC             → prevents timezone mismatch errors
# allowPublicKeyRetrieval=true   → needed for MySQL 8 auth plugin
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Lordvishnu@7a
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP (Spring Boot default connection pool) ───────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────────────
# update → Hibernate auto-creates / updates tables from entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Required for Spring Boot 3.x + Hibernate 6 + MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Avoid "open session in view" warning
spring.jpa.open-in-view=false

# ── Thymeleaf ───────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Session ─────────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Logging ─────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.example.expensetracker=DEBUG
