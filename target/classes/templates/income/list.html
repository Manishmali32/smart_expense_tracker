<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Incomes — Smart Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="app-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
 <div class="container-fluid px-4 py-4">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <h4 class="page-title mb-1">Income</h4>
      <p class="page-subtitle mb-0">Total:
        <span class="text-success fw-semibold">
          ₹<span th:text="${#numbers.formatDecimal(totalIncome,1,'COMMA',2,'POINT')}">0.00</span>
        </span>
      </p>
    </div>
    <a th:href="@{/incomes/new}" class="btn btn-success btn-add">
      <i class="bi bi-plus-lg me-2"></i>Add Income
    </a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success alert-dismissible d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card app-card">
    <div class="card-body p-0">
      <div th:if="${incomes.isEmpty()}" class="empty-state py-5">
        <i class="bi bi-cash-stack empty-icon"></i>
        <p class="empty-title">No incomes yet</p>
        <p class="empty-subtitle">Add your first income entry.</p>
        <a th:href="@{/incomes/new}" class="btn btn-success btn-sm"><i class="bi bi-plus-lg me-1"></i>Add Income</a>
      </div>
      <div th:if="${!incomes.isEmpty()}" class="table-responsive">
        <table class="table app-table mb-0">
          <thead>
            <tr><th>Title</th><th>Source</th><th>Date</th><th class="text-end">Amount</th><th class="text-center">Actions</th></tr>
          </thead>
          <tbody>
            <tr th:each="inc : ${incomes}">
              <td>
                <div class="expense-title" th:text="${inc.title}">Title</div>
                <div class="expense-notes" th:if="${inc.notes != null and !inc.notes.isEmpty()}"
                     th:text="${#strings.abbreviate(inc.notes,40)}"></div>
              </td>
              <td>
                <span class="category-badge" th:text="${inc.source}"></span>
              </td>
              <td class="text-muted small">
                <i class="bi bi-calendar3 me-1"></i>
                <span th:text="${#temporals.format(inc.incomeDate,'dd MMM yyyy')}">Date</span>
              </td>
              <td class="text-end fw-semibold" style="color:var(--color-success)">
                +₹<span th:text="${#numbers.formatDecimal(inc.amount,1,'COMMA',2,'POINT')}">0</span>
              </td>
              <td class="text-center">
                <div class="d-flex gap-1 justify-content-center">
                  <a th:href="@{/incomes/{id}/edit(id=${inc.id})}" class="btn btn-xs btn-outline-primary"><i class="bi bi-pencil"></i></a>
                  <form th:action="@{/incomes/{id}/delete(id=${inc.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-xs btn-outline-danger"
                            onclick="return confirm('Delete this income?')"><i class="bi bi-trash"></i></button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
