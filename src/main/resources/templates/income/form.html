<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title th:text="${isEdit} ? 'Edit Income' : 'Add Income'">Income Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="app-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
 <div class="container py-4" style="max-width:640px">

  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/incomes}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h4 class="page-title mb-0" th:text="${isEdit} ? 'Edit Income' : 'Add Income'">Income</h4>
  </div>

  <div class="card app-card">
   <div class="card-body p-4">
    <form th:action="${isEdit} ? @{/incomes/{id}/edit(id=${income.id})} : @{/incomes/new}"
          th:object="${income}" method="post">

      <div class="mb-3">
        <label class="form-label fw-medium">Title</label>
        <input type="text" class="form-control" th:field="*{title}" placeholder="e.g. April Salary"/>
        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-medium">Amount (₹)</label>
          <input type="number" step="0.01" class="form-control" th:field="*{amount}" placeholder="0.00"/>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Source</label>
          <select class="form-select" th:field="*{source}">
            <option value="">-- Select Source --</option>
            <option th:each="src : ${sources}" th:value="${src}" th:text="${src}"></option>
          </select>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('source')}" th:errors="*{source}"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-medium">Date</label>
        <input type="date" class="form-control" th:field="*{incomeDate}"/>
        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('incomeDate')}" th:errors="*{incomeDate}"></div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium">Notes <span class="text-muted">(optional)</span></label>
        <textarea class="form-control" th:field="*{notes}" rows="3" placeholder="Any extra details…"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success px-4"
                th:text="${isEdit} ? 'Update Income' : 'Save Income'">Save</button>
        <a th:href="@{/incomes}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
   </div>
  </div>

 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
