<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark sticky-top"
     style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
            box-shadow:0 2px 20px rgba(0,0,0,.4);">

  <div class="container-fluid px-4">

    <!-- Brand -->
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#e94560"/>
        <path d="M8 16L16 8l8 8h-4v8h-8v-8z" fill="white"/>
      </svg>
      <span style="letter-spacing:.4px">Smart<span style="color:#e94560">Expense</span></span>
    </a>

    <!-- Toggle -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto ms-3">

        <li class="nav-item">
          <a class="nav-link px-3"
             th:href="@{/dashboard}"
             th:classappend="${currentPage == 'dashboard'} ? ' active'">
            <i class="bi bi-grid-1x2-fill me-1"></i>Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3"
             th:href="@{/expenses}"
             th:classappend="${currentPage == 'expenses'} ? ' active'">
            <i class="bi bi-receipt me-1"></i>Expenses
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3"
             th:href="@{/incomes}"
             th:classappend="${currentPage == 'incomes'} ? ' active'">
            <i class="bi bi-cash-stack me-1"></i>Income
          </a>
        </li>

      </ul>

      <!-- Right Side -->
      <ul class="navbar-nav align-items-center gap-2">

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <div class="d-flex align-items-center gap-2 px-2">
            <div class="user-avatar"
                 style="width:35px;height:35px;border-radius:50%;background:#e94560;
                        color:white;display:flex;align-items:center;
                        justify-content:center;font-weight:bold;font-size:15px;">
              <span sec:authentication="name"
                    th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">U</span>
            </div>
            <span class="text-white-50 small" sec:authentication="name">User</span>
          </div>
        </li>

        <li class="nav-item">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-danger btn-sm px-3">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </form>
        </li>

      </ul>
    </div>
  </div>

</nav>
</html>
